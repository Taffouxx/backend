name: Docker Build & Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-base:
    name: Build Base Image (Rust compilation cache)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      base_tag: ghcr.io/taffouxx/api-build:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base image (Rust + all binaries)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/taffouxx/api-build:latest
          platforms: linux/amd64
          file: ./Dockerfile

  build-api:
    name: Build API (Delta)
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/taffouxx/api
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          file: ./crates/delta/Dockerfile
          build-args: |
            BASE_IMAGE=ghcr.io/taffouxx/api-build:latest

  build-events:
    name: Build Events (Bonfire)
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/taffouxx/events
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha

      - name: Build and push Events image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          file: ./crates/bonfire/Dockerfile
          build-args: |
            BASE_IMAGE=ghcr.io/taffouxx/api-build:latest
